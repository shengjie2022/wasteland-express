// Canvas 原生文字渲染（中文友好）
function pxTextNative(ctx, text, x, y, scale, color) {
  ctx.save();
  try {
    var fontSize = Math.max(11, Math.round(8 * scale));
    ctx.fillStyle = color;
    ctx.font = fontSize + "px 'Microsoft YaHei', 'SimHei', sans-serif";
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.fillText(text, Math.floor(x), Math.floor(y) + Math.round(6 * scale));
  } finally { ctx.restore(); }
  var w = 0;
  for (var i = 0; i < text.length; i++) {
    var ch = text.charAt(i);
    w += (FONT[ch.toUpperCase()] ? 6 : 13) * scale;
  }
  return x + w;
}

function pxText(ctx, text, x, y, scale, color) {
  if (!text) return x;
  return pxTextNative(ctx, text, x, y, scale || 1, color || PALETTE.TEXT);
}

function pxTextCenter(ctx, text, x, y, scale, color) {
  if (!text) return x;
  ctx.save();
  try {
    var fontSize = Math.max(11, Math.round(8 * (scale || 1)));
    ctx.fillStyle = color || PALETTE.TEXT;
    ctx.font = fontSize + "px 'Microsoft YaHei', 'SimHei', sans-serif";
    ctx.textBaseline = 'alphabetic';
    var w = ctx.measureText(text).width;
    ctx.fillText(text, x - w / 2, Math.floor(y) + Math.round(6 * (scale || 1)));
  } finally { ctx.restore(); }
  return x;
}

function fill(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function border(ctx, x, y, w, h, color, lineW) {
  if (lineW === undefined) lineW = 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  ctx.strokeRect(Math.floor(x) + 0.5, Math.floor(y) + 0.5, Math.floor(w) - 1, Math.floor(h) - 1);
}

function crtLines(ctx, W, H, alpha) {
  if (alpha === undefined) alpha = 0.07;
  ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
  for (var sy = 0; sy < H; sy += 2) ctx.fillRect(0, sy, W, 1);
}

function vignette(ctx, W, H) {
  var g = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawFragment(ctx, ox, oy, scale, glow, color) {
  scale = scale || 2; glow = glow || 0; color = color || PALETTE.F_ZERO;
  var s = scale;
  if (glow > 0) {
    ctx.fillStyle = color + '44';
    for (var r = 6; r > 0; r--) {
      ctx.beginPath();
      for (var i = 0; i < 6; i++) {
        var angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        var px = ox + 4*s + Math.cos(angle) * r*s;
        var py = oy + 4*s + Math.sin(angle) * r*s;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.fillStyle = color;
  ctx.beginPath();
  for (i = 0; i < 6; i++) {
    angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
    px = ox + 4*s + Math.cos(angle) * 3*s;
    py = oy + 4*s + Math.sin(angle) * 3*s;
    ctx.rect(px-2*s, py-2*s, 4*s, 4*s);
  }
  ctx.fill();
  fill(ctx, ox+3*s, oy+2*s, 2*s, 2*s, PALETTE.WHITE);
}

    fill(ctx, ox+3*s, oy+5*s, 2*s, 2*s, c);

function drawWastelandTerrain(ctx, x, y, w, h, variant) {
  variant = variant || 0;
  var horizon = y + h * 0.38;
  var sky = ctx.createLinearGradient(x, y, x, y + h * 0.42);
  sky.addColorStop(0, '#0e0818');
  sky.addColorStop(1, '#1e1230');
  ctx.fillStyle = sky; ctx.fillRect(x, y, w, h * 0.42);
  fill(ctx, x, horizon, w, h * 0.10, '#3a2010');
  fill(ctx, x, horizon+h*0.10, w, h * 0.02, '#2a1808');
  var ground = ctx.createLinearGradient(x, horizon, x, h);
  ground.addColorStop(0, '#4a3020'); ground.addColorStop(0.4, '#3a2518'); ground.addColorStop(1, '#1e1510');
  ctx.fillStyle = ground; ctx.fillRect(x, horizon + h * 0.12, w, h * 0.88);
  var rocks = [[20,178,8,5],[60,188,6,4],[100,183,10,6],[150,181,7,4],[200,186,9,5],[250,180,11,7],[290,185,6,4]];
  for (var r2 = 0; r2 < rocks.length; r2++) {
    var rx = rocks[r2];
    fill(ctx, x+rx[0], y+rx[1], rx[2], rx[3], '#5a4030');
    fill(ctx, x+rx[0], y+rx[1], rx[2], 1, '#6a5040');
    fill(ctx, x+rx[0], y+rx[1], 1, rx[3]-1, '#6a5040');
  }
  var cloudY = y + 18 + variant * 10;
  fill(ctx, x+40, y+cloudY, 30, 8, PALETTE.RADIATION+'33');
  fill(ctx, x+50, y+cloudY+2, 20, 6, PALETTE.RADIATION+'22');
  fill(ctx, x+200, y+cloudY+15, 40, 6, PALETTE.RADIATION+'28');
  fill(ctx, x+260, y+cloudY-5, 25, 5, PALETTE.RADIATION+'1a');
  var treeX = [80, 180, 260];
  for (var ti = 0; ti < treeX.length; ti++) {
    var tx = treeX[ti];
    fill(ctx, x+tx, y+horizon-24, 2, 22, '#1a1208');
    fill(ctx, x+tx-4, y+horizon-18, 3, 2, '#1a1208');
    fill(ctx, x+tx+3, y+horizon-14, 3, 2, '#1a1208');
    fill(ctx, x+tx-2, y+horizon-12, 2, 10, '#1a1208');
    fill(ctx, x+tx-3, y+horizon-26, 4, 4, '#2a3a10');
    fill(ctx, x+tx-1, y+horizon-30, 3, 6, '#1a2a08');
    fill(ctx, x+tx+2, y+horizon-28, 3, 5, '#2a3a10');
  }
  fill(ctx, x, horizon, w, 1, '#6a5040');
}

  fill(ctx, 0, 0, W, 20, PALETTE.BG3);
  border(ctx, 0, 0, W, 20, PALETTE.ACCENT);
  pxTextCenter(ctx, '★ 派系声望 ★', W/2, 6, 1.2, PALETTE.ACCENT);
  pxText(ctx, '回合:24  碎片: 3/7  积分: 4280', 180, 6, 1, PALETTE.TEXT_DIM);

  var factions = [
    {id:'铁脊髓', color:PALETTE.F_IRON, rep:2, level:'信任', rank:'超级会员', desc:'秩序、纪律、遗产', discount:-20, missions:3, totalM:3, border:PALETTE.F_IRON, icon:'IRON'},
    {id:'打捷联盟', color:PALETTE.F_SALVAGE, rep:1, level:'友好', rank:'信任', desc:'收集旧技术。反灰烬净化', discount:-10, missions:2, totalM:3, border:PALETTE.F_SALVAGE, icon:'SALVAGE'},
    {id:'雷烽探索', color:PALETTE.F_ZERO, rep:1, level:'友好', rank:'合作伙伴', desc:'真相就在那里', discount:-10, missions:1, totalM:3, border:PALETTE.F_ZERO, icon:'ZERO'},
    {id:'锈轮市场', color:PALETTE.F_RUST, rep:0, level:'中立', rank:'正常', desc:'售罄一切。问题却不问', discount:0, missions:0, totalM:3, border:PALETTE.F_RUST, icon:'RUST'},
    {id:'纯素土地', color:PALETTE.F_PURE, rep:-1, level:'敌视', rank:'避开', desc:'保护食物。保护生命', discount:15, missions:0, totalM:3, border:PALETTE.TEXT_DIM, icon:'PURE'},
    {id:'灰烬亲族', color:PALETTE.F_ASH, rep:-1, level:'敌视', rank:'避开', desc:'净化废土。残灭变异者', discount:15, missions:0, totalM:3, border:PALETTE.TEXT_DIM, icon:'ASH'}
  ];

  for (var fi2 = 0; fi2 < factions.length; fi2++) {
    var f = factions[fi2];
    var fy = 24+fi2*35;
    var fx = 4, fw = W-8;
    fill(ctx, fx, fy, fw, 33, PALETTE.BG2);
    border(ctx, fx, fy, fw, 33, f.border);
    drawFactionIcon(ctx, fx+4, fy+4, f.icon, 1.5);
    pxText(ctx, f.id, fx+30, fy+6, 1.3, f.color);
    pxText(ctx, '[' + f.level + ']  等级: ' + f.rank, fx+30, fy+16, 1, PALETTE.TEXT_DIM);
    var barStart = fx+160;
    pxText(ctx, '声:', barStart, fy+10, 1, PALETTE.TEXT_DIM);
    var labels2 = ['敌', '无', '中', '友', '信'];
    for (var r4 = 0; r4 < 5; r4++) {
      var filled3 = r4 <= f.rep+2;
      fill(ctx, barStart+28+r4*10, fy+4, 8, 6, filled3 ? f.color : '#222');
      fill(ctx, barStart+28+r4*10, fy+10, 8, 3, filled3 ? f.color+'88' : '#111');
      pxText(ctx, labels2[r4], barStart+28+r4*10, fy+14, 1, PALETTE.TEXT_DARK);
    }
    var disc2 = f.discount >= 0 ? '+' + f.discount + '%' : f.discount + '%';
    pxText(ctx, disc2 + '商店', barStart+85, fy+10, 1, f.discount < 0 ? PALETTE.SUCCESS : f.discount > 0 ? PALETTE.DANGER : PALETTE.TEXT_DIM);
    pxText(ctx, f.desc, fx+30, fy+24, 1, PALETTE.TEXT_DIM);
    var qDone = f.missions;
    pxText(ctx, '任务:', barStart+85, fy+24, 1, PALETTE.TEXT_DIM);
    for (var q2 = 0; q2 < f.totalM; q2++) {
      fill(ctx, barStart+130+q2*10, fy+24, 8, 5, q2 < qDone ? PALETTE.ACCENT : PALETTE.BG3);
      border(ctx, barStart+130+q2*10, fy+24, 8, 5, PALETTE.BORDER);
    }
  }
  fill(ctx, 0, H-20, W, 20, PALETTE.BG3);
  border(ctx, 0, H-20, W, 20, PALETTE.ACCENT);
  pxText(ctx, '[点击派系] 查看任务  [任] 派系任务  [商] 商业市  [返] 返回', 4, H-14, 1, PALETTE.TEXT_DIM);
  crtLines(ctx, W, H);
  vignette(ctx, W, H);
}

// ============================================================
// 画面4: 零点碎片收集
// ============================================================
function renderFragmentsScene(canvas) {
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var t = Date.now();
  fill(ctx, 0, 0, W, H, PALETTE.BG);
  ctx.fillStyle = PALETTE.BG2; ctx.fillRect(0, 0, W, H);
  var radAlpha = 0.05 + Math.sin(t/1000)*0.03;
  ctx.strokeStyle = PALETTE.F_ZERO + Math.floor(radAlpha*255).toString(16).padStart(2,'0');
  ctx.lineWidth = 1;
  for (var gx2 = 0; gx2 < W; gx2 += 20) { ctx.beginPath(); ctx.moveTo(gx2, 0); ctx.lineTo(gx2, H); ctx.stroke(); }
  for (var gy2 = 0; gy2 < H; gy2 += 20) { ctx.beginPath(); ctx.moveTo(0, gy2); ctx.lineTo(W, gy2); ctx.stroke(); }
  fill(ctx, 0, 0, W, 20, PALETTE.BG3);
  border(ctx, 0, 0, W, 20, PALETTE.F_ZERO);
  pxTextCenter(ctx, '★ 零点碎片 ★', W/2, 6, 1.2, PALETTE.F_ZERO);
  pxText(ctx, '回合:24  积分: 4280  乘员: 4', 180, 6, 1, PALETTE.TEXT_DIM);

  var fragments = [
    {id:1, name:'觉醒了', loc:'铁刺镇', req:'铁脊+2声望', found:true, color:PALETTE.F_ZERO},
    {id:2, name:'第一纹', loc:'锈镇', req:'打捷+1声望', found:true, color:PALETTE.F_ZERO},
    {id:3, name:'信号', loc:'灰谷', req:'完成主线', found:true, color:PALETTE.F_ZERO},
    {id:4, name:'档案', loc:'雷烽废墟', req:'收集全部记录', found:false, color:PALETTE.F_ZERO+'66'},
    {id:5, name:'关键', loc:'锈山谷', req:'打败帝国', found:false, color:PALETTE.F_ZERO+'44'},
    {id:6, name:'门', loc:'纯素绝地', req:'纯土+2声望', found:false, color:PALETTE.F_ZERO+'44'},
    {id:7, name:'核心', loc:'雷烽设施', req:'收集全部碎片', found:false, color:PALETTE.F_ZERO+'22'}
  ];

  fill(ctx, 4, 24, W-8, 20, PALETTE.BG2);
  border(ctx, 4, 24, W-8, 20, PALETTE.F_ZERO);
  pxText(ctx, '零点碎片收集:', 8, 29, 1, PALETTE.F_ZERO);
  for (var ffi = 0; ffi < 7; ffi++) {
    var ffx = 8+ffi*44, ffy2 = 28;
    var glow2 = Math.sin(t/500+ffi*0.5)*0.5+0.5;
    var fg = fragments[ffi];
    drawFragment(ctx, ffx, ffy2, 1.5, fg.found ? glow2 : 0, fg.color);
    pxText(ctx, (ffi+1).toString(), ffx+5, ffy2+16, 1, fg.found ? PALETTE.F_ZERO : PALETTE.F_ZERO+'44');
  }
  fill(ctx, 8, 48, W-16, 6, PALETTE.BG3);
  fill(ctx, 8, 48, Math.floor((W-16)*3/7), 6, PALETTE.F_ZERO);
  pxText(ctx, '3 / 7', 10, 47, 1, PALETTE.BG);
  pxText(ctx, '3 / 7', W-36, 47, 1, PALETTE.F_ZERO);

  for (var ffi2 = 0; ffi2 < fragments.length; ffi2++) {
    var f2 = fragments[ffi2];
    var row2 = Math.floor(ffi2/2);
    var col2 = ffi2 % 2;
    var ffy3 = 60+row2*38;
    var ffx2 = 4+col2*(W/2);
    var fw2 = W/2-8;
    fill(ctx, ffx2, ffy3, fw2, 35, f2.found ? PALETTE.BG2 : PALETTE.BG3);
    border(ctx, ffx2, ffy3, fw2, 35, f2.found ? PALETTE.F_ZERO : PALETTE.BORDER);
    drawFragment(ctx, ffx2+4, ffy3+4, 1.5, f2.found ? Math.sin(t/400+ffi2)*0.5+0.5 : 0, f2.color);
    pxText(ctx, '#' + f2.id.toString().padStart(2,'0'), ffx2+22, ffy3+6, 1.3, f2.color);
    pxText(ctx, f2.name, ffx2+22, ffy3+16, 1, f2.found ? PALETTE.TEXT : PALETTE.TEXT_DIM);
    pxText(ctx, f2.found ? '[已获] ' + f2.loc : '[锁定] ' + f2.req, ffx2+22, ffy3+25, 1, f2.found ? PALETTE.SUCCESS : PALETTE.TEXT_DARK);
  }

  var trueEndingY = H-50;
  fill(ctx, 4, trueEndingY, W-8, 46, PALETTE.BG2);
  border(ctx, 4, trueEndingY, W-8, 46, PALETTE.F_ZERO, 2);
  if (Math.sin(t/300) > 0) border(ctx, 4, trueEndingY, W-8, 46, PALETTE.F_ZERO+'88', 2);
  pxTextCenter(ctx, '>>> 真结局: 零点真相 <<<', W/2, trueEndingY+6, 1, PALETTE.F_ZERO);
  pxText(ctx, '解锁条件: 全部 7 块碎片 + 铁脊+2 + 雷烽+2 + 10000+积分', 8, trueEndingY+18, 1, PALETTE.TEXT_DIM);
  pxText(ctx, '条件已满: 3/7碎片 铁脊+2 ✓ 雷烽+1 ✗ 分数 4280 ✗', 8, trueEndingY+28, 1, PALETTE.TEXT_DIM);
  pxText(ctx, '[回车] 进入雷烽设施   [返] 返回', 8, trueEndingY+38, 1, PALETTE.TEXT_DIM);
  pxText(ctx, '已解锁: 3 个结局  |  文啬记录: 6/20  |  派系勋章: 4/6', 4, H-8, 1, PALETTE.TEXT_DARK);
  crtLines(ctx, W, H);
  vignette(ctx, W, H);
}

// ============================================================
// 动画循环
// ============================================================
function animate() {
  renderCombatScene(document.getElementById('canvas1'));
  renderTownScene(document.getElementById('canvas2'));
  renderFactionsScene(document.getElementById('canvas3'));
  renderFragmentsScene(document.getElementById('canvas4'));
  requestAnimationFrame(animate);
}

animate();
</script>
