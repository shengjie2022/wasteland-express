// 检测文本是否含有像素字体不支持的字符（含中文字符）
function hasNonBitmapChar(text) {
  if (!text) return false;
  for (const ch of text) {
    if (!FONT[ch.toUpperCase()]) return true;
  }
  return false;
}

// 像素字体渲染（仅支持 ASCII 字符）
function pxTextBitmap(ctx, text, x, y, scale, color) {
  ctx.fillStyle = color;
  let cx = Math.floor(x);
  for (const ch of text.toUpperCase()) {
    const glyph = FONT[ch] || FONT[' '];
    for (let row = 0; row < glyph.length; row++) {
      for (let col = 0; col < glyph[row].length; col++) {
        if (glyph[row][col]) {
          ctx.fillRect(cx + col * scale, Math.floor(y) + row * scale, Math.ceil(scale), Math.ceil(scale));
        }
      }
    }
    cx += (glyph[0].length + 1) * scale;
  }
  return cx;
}

function pxTextNative(ctx, text, x, y, scale, color) {
  ctx.save();
  try {
    const fontSize = Math.round(8 * scale);
    ctx.fillStyle = color;
    ctx.font = `${fontSize}px 'Microsoft YaHei', 'SimHei', 'PingFang SC', sans-serif`;
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.fillText(text, Math.floor(x), Math.floor(y) + Math.round(6 * scale));
  } finally {
    ctx.restore();
  }
  let w = 0;
  for (const ch of text) {
    w += (FONT[ch.toUpperCase()] ? 4 : 13) * scale;
  }
  return x + w;
}

function pxText(ctx, text, x, y, scale = 1, color = PALETTE.TEXT) {
  if (!text) return x;
  if (hasNonBitmapChar(text)) {
    return pxTextNative(ctx, text, x, y, scale, color);
  }
  return pxTextBitmap(ctx, text, x, y, scale, color);
}

function pxTextCenter(ctx, text, x, y, scale = 1, color = PALETTE.TEXT) {
  if (!text) return x;
  if (hasNonBitmapChar(text)) {
    ctx.save();
    try {
      const fontSize = Math.round(8 * scale);
      ctx.fillStyle = color;
      ctx.font = `${fontSize}px 'Microsoft YaHei', 'SimHei', 'PingFang SC', sans-serif`;
      ctx.textBaseline = 'alphabetic';
      const w = ctx.measureText(text).width;
      ctx.fillText(text, x - w / 2, Math.floor(y) + Math.round(6 * scale));
    } finally {
      ctx.restore();
    }
    return x;
  }
  let w = 0;
  for (const ch of text.toUpperCase()) {
    const glyph = FONT[ch] || FONT[' '];
    w += (glyph[0].length + 1) * scale;
  }
  return pxTextBitmap(ctx, text, x - w / 2, y, scale, color);
}

function pxTextWrap(ctx, text, x, y, maxW, scale, color) {
  const lines = [], words = text.split(' ');
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    let tw = 0;
    for (const ch of test.toUpperCase()) {
      const g = FONT[ch] || FONT[' '];
      tw += (g[0].length + 1) * scale;
    }
    if (tw > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  let cy = y;
  for (const l of lines) { pxText(ctx, l, x, cy, scale, color); cy += 8 * scale; }
  return cy;
}

function fill(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function rect(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function border(ctx, x, y, w, h, color = PALETTE.BORDER, lineW = 1) {
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  ctx.strokeRect(Math.floor(x) + 0.5, Math.floor(y) + 0.5, Math.floor(w) - 1, Math.floor(h) - 1);
}

function crtLines(ctx, W, H, alpha = 0.07) {
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  for (let sy = 0; sy < H; sy += 2) ctx.fillRect(0, sy, W, 1);
}

function vignette(ctx, W, H) {
  const g = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// 废土货车 (64x32 基准, 缩放 2x = 128x64 在场景中)
function drawTruck(ctx, ox, oy, scale = 1, facingRight = true, damaged = false) {
  const s = scale;
  const d = facingRight ? 1 : -1;
  const fx = facingRight ? ox : ox;

  // 阴影
  fill(ctx, fx + 2*s, oy + 26*s, 52*s, 4*s, 'rgba(0,0,0,0.4)');

  // 轮胎 x2
  fill(ctx, fx + 4*s,  oy + 18*s, 10*s, 10*s, PALETTE.WHEEL);
  fill(ctx, fx + 5*s,  oy + 19*s, 8*s,  8*s,  '#2a2a2a');
  fill(ctx, fx + 7*s,  oy + 21*s, 4*s,  4*s,  PALETTE.WHEEL_RIM);
  fill(ctx, fx + 38*s, oy + 18*s, 10*s, 10*s, PALETTE.WHEEL);
  fill(ctx, fx + 39*s, oy + 19*s, 8*s,  8*s,  '#2a2a2a');
  fill(ctx, fx + 41*s, oy + 21*s, 4*s,  4*s,  PALETTE.WHEEL_RIM);

  // 车厢主体
  fill(ctx, fx + 10*s, oy + 4*s,  36*s, 18*s, PALETTE.TRUCK_BODY);
  fill(ctx, fx + 11*s, oy + 5*s,  34*s, 16*s, PALETTE.TRUCK_ACC);
  // 车厢顶部加强筋
  fill(ctx, fx + 14*s, oy + 3*s,  28*s, 2*s,  PALETTE.TRUCK_DARK);
  // 车厢侧面铁皮纹理
  for (let i = 0; i < 5; i++) {
    fill(ctx, fx + 13*s + i*7*s, oy + 6*s, 5*s, 14*s, PALETTE.TRUCK_BODY);
  }
  // 侧门
  fill(ctx, fx + 18*s, oy + 8*s,  12*s, 10*s, PALETTE.TRUCK_DARK);
  fill(ctx, fx + 28*s, oy + 8*s,  14*s, 10*s, PALETTE.TRUCK_DARK);
  // 门把手
  fill(ctx, fx + 27*s, oy + 12*s, 2*s,  2*s,  PALETTE.WHEEL_RIM);
  // 车厢后部
  fill(ctx, fx + 46*s, oy + 6*s,  2*s,  14*s, PALETTE.TRUCK_DARK);

// 零点碎片精灵 (发光六边形, 8x8)
function drawFragment(ctx, ox, oy, scale = 2, glow = 0, color = PALETTE.F_ZERO) {
  const s = scale;
  const g = glow;

  // 外发光
  if (g > 0) {
    ctx.fillStyle = color + '44';
    const points = 6;
    for (let r = 6; r > 0; r--) {
      ctx.beginPath();
      for (let i = 0; i < points; i++) {
        const angle = (i / points) * Math.PI * 2 - Math.PI / 2;
        const px = ox + 4*s + Math.cos(angle) * r*s;
        const py = oy + 4*s + Math.sin(angle) * r*s;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }
  }

  // 六边形本体
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
    const px = ox + 4*s + Math.cos(angle) * 3*s;
    const py = oy + 4*s + Math.sin(angle) * 3*s;
    i === 0 ? ctx.fillRect(px-2*s, py-2*s, 4*s, 4*s) : ctx.fillRect(px-2*s, py-2*s, 4*s, 4*s);
  }

  // 内部高光
  fill(ctx, ox + 3*s, oy + 2*s, 2*s, 2*s, PALETTE.WHITE);
}

// 派系图标 (12x12)
function drawFactionIcon(ctx, ox, oy, faction, scale = 1) {
  const s = scale;
  const colors = {
    SALVAGE:  [PALETTE.F_SALVAGE, '#cc8800'],
    ASH:      [PALETTE.F_ASH,      '#666666'],
    RUST:     [PALETTE.F_RUST,     '#aa2222'],
    IRON:     [PALETTE.F_IRON,     '#338833'],
    PURE:     [PALETTE.F_PURE,     '#66aa33'],
    ZERO:     [PALETTE.F_ZERO,     '#33cc66'],
  };
  const [c, cd] = colors[faction] || [PALETTE.TEXT, PALETTE.TEXT_DIM];

  // 背景圆
  fill(ctx, ox + 1*s, oy + 1*s, 10*s, 10*s, c + '33');
  fill(ctx, ox + 2*s, oy + 2*s, 8*s,  8*s,  c + '66');
  fill(ctx, ox + 3*s, oy + 3*s, 6*s,  6*s,  c);

  // 各派系符号
  if (faction === 'SALVAGE') {
    // 齿轮
    for (let i = 0; i < 8; i++) {
      fill(ctx, ox + 5*s + Math.cos(i*Math.PI/4)*3*s, oy + 5*s + Math.sin(i*Math.PI/4)*3*s, 2*s, 2*s, cd);
    }
    fill(ctx, ox + 4*s, oy + 4*s, 4*s, 4*s, c);
  } else if (faction === 'ASH') {
    // 火焰
    fill(ctx, ox + 4*s, oy + 6*s, 4*s, 3*s, cd);
    fill(ctx, ox + 5*s, oy + 4*s, 2*s, 3*s, c);
    fill(ctx, ox + 5*s, oy + 3*s, 2*s, 2*s, PALETTE.WHITE + '88');
  } else if (faction === 'RUST') {
    // 骷髅
    fill(ctx, ox + 4*s, oy + 3*s, 4*s, 4*s, cd);
    fill(ctx, ox + 5*s, oy + 4*s, 2*s, 2*s, c);
    fill(ctx, ox + 4*s, oy + 7*s, 4*s, 2*s, cd);
  } else if (faction === 'IRON') {
    // 脊椎/盾牌
    fill(ctx, ox + 4*s, oy + 2*s, 4*s, 8*s, cd);
    fill(ctx, ox + 5*s, oy + 3*s, 2*s, 6*s, c);
    fill(ctx, ox + 5*s, oy + 5*s, 2*s, 2*s, cd);
  } else if (faction === 'PURE') {
    // 麦穗/植物
    fill(ctx, ox + 5*s, oy + 2*s, 2*s, 8*s, cd);
    fill(ctx, ox + 3*s, oy + 4*s, 2*s, 2*s, c);
    fill(ctx, ox + 7*s, oy + 4*s, 2*s, 2*s, c);
    fill(ctx, ox + 3*s, oy + 6*s, 2*s, 2*s, c);
    fill(ctx, ox + 7*s, oy + 6*s, 2*s, 2*s, c);
  } else if (faction === 'ZERO') {
    // 零点符号
    fill(ctx, ox + 4*s, oy + 4*s, 4*s, 4*s, cd);
    fill(ctx, ox + 5*s, oy + 5*s, 2*s, 2*s, PALETTE.WHITE);
    fill(ctx, ox + 5*s, oy + 3*s, 2*s, 2*s, c);
    fill(ctx, ox + 5*s, oy + 7*s, 2*s, 2*s, c);
    fill(ctx, ox + 3*s, oy + 5*s, 2*s, 2*s, c);
    fill(ctx, ox + 7*s, oy + 5*s, 2*s, 2*s, c);
  }
}

// 地形绘制 - 废土荒野
function drawWastelandTerrain(ctx, x, y, w, h, variant = 0) {
  // 天空渐变
  const sky = ctx.createLinearGradient(x, y, x, y + h * 0.4);
  sky.addColorStop(0, '#0a0815');
  sky.addColorStop(1, '#1a1025');
  ctx.fillStyle = sky;
  ctx.fillRect(x, y, w, h * 0.4);

  // 地平线
  const horizon = y + h * 0.38;
  fill(ctx, x, horizon, w, h * 0.08, '#2a1810');

  // 地面
  const ground = ctx.createLinearGradient(x, horizon, x, h);
  ground.addColorStop(0, '#3a2a18');
  ground.addColorStop(0.5, '#2a2015');
  ground.addColorStop(1, '#1a1510');
  ctx.fillStyle = ground;
  ctx.fillRect(x, horizon + h * 0.06, w, h * 0.56);

  // 碎石
  const rocks = [
    [20, 185, 8, 5], [60, 195, 6, 4], [100, 190, 10, 6],
    [150, 188, 7, 4], [200, 193, 9, 5], [250, 187, 11, 7],
    [290, 192, 6, 4],
  ];
  for (const [rx, ry, rw, rh] of rocks) {
    fill(ctx, x + rx, y + ry, rw, rh, '#4a3828');
    fill(ctx, x + rx, y + ry, rw, 1, '#5a4838');
  }

  // 辐射云
  const cloudY = y + 20 + variant * 10;
  fill(ctx, x + 40, y + cloudY, 30, 8, PALETTE.F_RADIATION + '22');
  fill(ctx, x + 50, y + cloudY + 2, 20, 6, PALETTE.F_RADIATION + '15');
  fill(ctx, x + 200, y + cloudY + 15, 40, 6, PALETTE.F_RADIATION + '18');
  fill(ctx, x + 260, y + cloudY - 5, 25, 5, PALETTE.F_RADIATION + '12');

  // 枯树轮廓
  const treeX = [80, 180, 260];
  for (const tx of treeX) {
    fill(ctx, x + tx, y + horizon - 20, 2, 20, '#1a1208');
    fill(ctx, x + tx - 4, y + horizon - 16, 3, 2, '#1a1208');
    fill(ctx, x + tx + 3, y + horizon - 12, 3, 2, '#1a1208');
    fill(ctx, x + tx - 2, y + horizon - 10, 2, 8, '#1a1208');
  }
}

// 城镇背景
function drawTownBG(ctx, x, y, w, h, townType = 'MILITARY') {
  // 夜空
  const sky = ctx.createLinearGradient(x, y, x, y + h * 0.5);
  sky.addColorStop(0, '#0a0a12');
  sky.addColorStop(1, '#1a1520');
  ctx.fillStyle = sky;
  ctx.fillRect(x, y, w, h * 0.5);

  // 远山剪影
  fill(ctx, x, y + h * 0.35, w, h * 0.15, '#1a1510');
  fill(ctx, x + 20, y + h * 0.32, 40, h * 0.03, '#252015');
  fill(ctx, x + 100, y + h * 0.30, 60, h * 0.05, '#252015');
  fill(ctx, x + 200, y + h * 0.33, 50, h * 0.02, '#252015');
  fill(ctx, x + 260, y + h * 0.28, 40, h * 0.07, '#252015');

  // 地面
  fill(ctx, x, y + h * 0.48, w, h * 0.52, '#2a2015');

  // 城镇建筑 (不同类型)
  const buildingColor = townType === 'MILITARY' ? '#3a3a3a' :
                        townType === 'TRADING'  ? '#4a3a2a' :
                        townType === 'RUINS'    ? '#3a3020' : '#3a3a30';

  // 建筑群
  fill(ctx, x + 10,  y + h * 0.28, 25, h * 0.20, buildingColor);
  fill(ctx, x + 15, y + h * 0.25, 15, h * 0.03, '#4a4a4a');
  fill(ctx, x + 55,  y + h * 0.30, 35, h * 0.18, buildingColor + 'cc');
  fill(ctx, x + 60,  y + h * 0.27, 25, h * 0.03, '#5a5a5a');
  fill(ctx, x + 120, y + h * 0.25, 20, h * 0.23, buildingColor + 'aa');
  fill(ctx, x + 160, y + h * 0.32, 45, h * 0.16, buildingColor + 'dd');
  fill(ctx, x + 165, y + h * 0.29, 35, h * 0.03, '#5a5a5a');
  fill(ctx, x + 230, y + h * 0.28, 30, h * 0.20, buildingColor + 'cc');
  fill(ctx, x + 235, y + h * 0.25, 20, h * 0.03, '#4a4a4a');
  fill(ctx, x + 280, y + h * 0.33, 25, h * 0.15, buildingColor + 'bb');

  // 窗户灯光
  const windowFlicker = Math.floor(Date.now() / 800) % 3;
  const winData = [
    [18, 30, 5], [22, 30, 5], [70, 33, 4], [75, 33, 4],
    [125, 28, 4], [130, 28, 4], [170, 35, 5], [175, 35, 5],
    [238, 31, 4], [243, 31, 4],
  ];
  for (const [wx, wy, ws] of winData) {
    const flicker = (wx / 10 + windowFlicker) % 2 === 0;
    fill(ctx, x + wx, y + wy * (h/100), ws, ws,
         flicker ? PALETTE.ACCENT_HI + 'aa' : PALETTE.ACCENT + '66');
  }

  // 城镇灯光
  fill(ctx, x + 5,  y + h * 0.20, 2, 2, PALETTE.ACCENT + '44');
  fill(ctx, x + 300, y + h * 0.18, 2, 2, PALETTE.ACCENT + '44');
}

// ============================================================
// 画面1: 战斗/事件场景
// ============================================================
function renderCombatScene(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const t = Date.now();

  // 清屏
  fill(ctx, 0, 0, W, H, PALETTE.BG);

  // 地形背景
  drawWastelandTerrain(ctx, 0, 0, W, H, 0);

  // 道路
  fill(ctx, 0, H - 80, W, 30, PALETTE.DIRT);
  fill(ctx, 0, H - 78, W, 2, PALETTE.SAND);
  fill(ctx, 0, H - 50, W, 2, PALETTE.SAND);
  // 道路纹理
  for (let rx = 0; rx < W; rx += 12) {
    fill(ctx, rx, H - 74, 6, 2, PALETTE.GROUND + 'aa');
  }

  // === 货车 (左) ===
  drawTruck(ctx, 30, H - 110, 1.5, true, false);

  // === 强盗 (右) ===
  drawBandit(ctx, W - 100, H - 115, 2, Math.floor(t / 100) % 8, false);

  // 第二个强盗 (中远)
  drawBandit(ctx, W - 65, H - 100, 1.5, Math.floor(t / 120) % 8 + 2, false);

  // 战斗特效
  const impactFrame = Math.floor(t / 300) % 4;
  if (impactFrame < 2) {
    // 枪口闪光
    fill(ctx, W - 110, H - 95, 10, 6, PALETTE.ACCENT_HI + 'cc');
    fill(ctx, W - 105, H - 93, 6, 4, PALETTE.WHITE + '88');
    // 子弹轨迹
    fill(ctx, W - 120, H - 93, 15, 2, PALETTE.ACCENT + '88');
  }

  // 血量条
  fill(ctx, 20, 10, 100, 8, PALETTE.BG2);
  border(ctx, 20, 10, 100, 8, PALETTE.BORDER);
  fill(ctx, 21, 11, 97, 6, PALETTE.DANGER + '44');
  fill(ctx, 21, 11, 75, 6, PALETTE.DANGER);
  pxText(ctx, 'HP: 75/100', 22, 12, 1, PALETTE.WHITE);

  // 敌人血条
  fill(ctx, W - 120, 10, 100, 8, PALETTE.BG2);
  border(ctx, W - 120, 10, 100, 8, PALETTE.BORDER);
  fill(ctx, W - 119, 11, 98, 6, PALETTE.DANGER + '44');
  fill(ctx, W - 119, 11, 45, 6, PALETTE.DANGER);
  pxText(ctx, '\u5F37\u76F2: 45', W - 118, 12, 1, PALETTE.WHITE);

  // === 对话框 ===
  const dlgY = H - 70;
  fill(ctx, 4, dlgY, W - 8, 65, PALETTE.BG2);
  border(ctx, 4, dlgY, W - 8, 65, PALETTE.ACCENT, 2);
  // 对话框标题栏
  fill(ctx, 4, dlgY, W - 8, 12, PALETTE.BG3);

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const t = Date.now();

  fill(ctx, 0, 0, W, H, PALETTE.BG);

  ctx.fillStyle = PALETTE.BG2;
  ctx.fillRect(0, 0, W, H);

  // 背景辐射网格
  const radAlpha = 0.05 + Math.sin(t / 1000) * 0.03;
  ctx.strokeStyle = PALETTE.F_ZERO + Math.floor(radAlpha * 255).toString(16).padStart(2, '0');
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 20) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += 20) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // 标题
  fill(ctx, 0, 0, W, 20, PALETTE.BG3);
  border(ctx, 0, 0, W, 20, PALETTE.F_ZERO);
  pxText(ctx, '\u2605 \u96F6\u70B9\u788D\u7247 \u2605', 4, 6, 1.2, PALETTE.F_ZERO);
  pxText(ctx, '\u56DE:24   \u79EF\u5206: 4280   \u4E58\u5458: 4', 180, 6, 1, PALETTE.TEXT_DIM);

  // 碎片详情
  const fragments = [
    { id: 1, name: '\u89C9\u9192',        loc: '\u94C1\u523A\u9547',        req: '\u94C1\u810A+2\u58F0\u671B',    found: true,  color: PALETTE.F_ZERO },
    { id: 2, name: '\u7B2C\u4E00\u7EB9',   loc: '\u94FD\u9547',            req: '\u6253\u6377+1\u58F0\u671B',     found: true,  color: PALETTE.F_ZERO },
    { id: 3, name: '\u4FE1\u53F7',        loc: '\u7070\u8C37',             req: '\u5B8C\u6210\u4E3B\u7EBF',       found: true,  color: PALETTE.F_ZERO },
    { id: 4, name: '\u6863\u6848',        loc: '\u96F7\u70F9\u5E9F\u589F',     req: '\u6536\u96C6\u5168\u90E8\u8BB0\u5F55',   found: false, color: PALETTE.F_ZERO + '66' },
    { id: 5, name: '\u5173\u952E',        loc: '\u94FD\u5C71\u8C37',       req: '\u6253\u8D25\u5E1D\u56FD',       found: false, color: PALETTE.F_ZERO + '44' },
    { id: 6, name: '\u95E8',             loc: '\u7EAF\u7D20\u7EDD\u7F6E',       req: '\u7EAF\u571F+2\u58F0\u671B',      found: false, color: PALETTE.F_ZERO + '44' },
    { id: 7, name: '\u6838\u5FC3',        loc: '\u96F7\u70F9\u8BBE\u65BD',      req: '\u6536\u96C6\u5168\u90E8\u788D\u7247',    found: false, color: PALETTE.F_ZERO + '22' },
  ];

  // 碎片进度条 (大号)
  fill(ctx, 4, 24, W - 8, 20, PALETTE.BG2);
  border(ctx, 4, 24, W - 8, 20, PALETTE.F_ZERO);
  pxText(ctx, '\u96F6\u70B9\u788D\u7247\u6536\u96C6:', 8, 29, 1, PALETTE.F_ZERO);

  // 碎片图标 (顶部横排)
  for (let fi = 0; fi < 7; fi++) {
    const fx2 = 8 + fi * 44;
    const fy2 = 28;
    const glow = Math.sin(t / 500 + fi * 0.5) * 0.5 + 0.5;
    const fg = fragments[fi];
    drawFragment(ctx, fx2, fy2, 1.5, fg.found ? glow : 0, fg.color);
    pxText(ctx, (fi + 1).toString(), fx2 + 5, fy2 + 16, 1, fg.found ? PALETTE.F_ZERO : PALETTE.F_ZERO + '44');

  // 进度条
  fill(ctx, 8, 48, W - 16, 6, PALETTE.BG3);

    // 碎片编号
    pxText(ctx, '#' + f.id.toString().padStart(2, '0'), fx + 22, fy + 6, 1.3, f.color);
    pxText(ctx, f.name, fx + 22, fy + 16, 1, f.found ? PALETTE.TEXT : PALETTE.TEXT_DIM);
    pxText(ctx, f.found ? '[\u5DF2\u83B7] ' + f.loc : '[\u9501\u5B9A] ' + f.req,
           fx + 22, fy + 25, 1, f.found ? PALETTE.SUCCESS : PALETTE.TEXT_DARK);
  });

  // 真结局预览
  const trueEndingY = H - 50;
  fill(ctx, 4, trueEndingY, W - 8, 46, PALETTE.BG2);
  border(ctx, 4, trueEndingY, W - 8, 46, PALETTE.F_ZERO, 2);

  // 闪烁边框效果
  const borderFlash = Math.sin(t / 300) > 0;
  if (borderFlash) {
    border(ctx, 4, trueEndingY, W - 8, 46, PALETTE.F_ZERO + '88', 2);
  }

  pxText(ctx, '\u226B\u226B \u771F\u7ED3\u5C40: \u96F6\u70B9\u771F\u76F8 \u226A\u226A', 8, trueEndingY + 6, 1, PALETTE.F_ZERO);
  const endingReq = '\u89E3\u9501\u6761\u4EF6: \u5168\u90E8 7 \u5757\u788D\u7247 + \u94C1\u810A+2 + \u96F7\u70F9+2 + 10000+\u79EF\u5206';
  const reqMet = '\u6761\u4EF6\u5DF2\u6EE1: 3/7\u788D\u7247 \u94C1+2 \u2713 \u96F7+1 \u2717 \u5206\u6570 4280 \u2717';
  pxText(ctx, endingReq, 8, trueEndingY + 18, 1, PALETTE.TEXT_DIM);
  pxText(ctx, reqMet, 8, trueEndingY + 28, 1, PALETTE.TEXT_DIM);
  pxText(ctx, '[\u56DE\u8F66] \u8FDB\u5165\u96F7\u70F9\u8BBE\u65BD   [\u8FD4] \u8FD4\u56DE', 8, trueEndingY + 38, 1, PALETTE.TEXT_DIM);

  // 已知结局
  pxText(ctx, '\u5DF2\u89E3\u9501: 3 \u4E2A\u7ED3\u5C40  |  \u6587\u732E\u8BB0\u5F55: 6/20  |  \u6D3E\u7CFB\u52CB\u7AE0: 4/6',
         4, H - 8, 1, PALETTE.TEXT_DARK);

  crtLines(ctx, W, H);
  vignette(ctx, W, H);
}

// ============================================================
// 动画循环
// ============================================================
function animate() {
  renderCombatScene(document.getElementById('canvas1'));
  renderTownScene(document.getElementById('canvas2'));
  renderFactionsScene(document.getElementById('canvas3'));
  renderFragmentsScene(document.getElementById('canvas4'));
  requestAnimationFrame(animate);
}

window.addEventListener('load', animate);
</script>
